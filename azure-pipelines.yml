trigger:
  branches:
    include:
      - main

variables:
  imageRepository: devops-shazia-09
  dockerfilePath: Dockerfile
  buildConfiguration: Release
  acrServiceConnection: replace-with-your-acr-service-connection
  azureSubscription: replace-with-your-azure-service-connection
  acrLoginServer: replace-with-your-acr-login-server
  containerAppName: replace-with-your-container-app-name
  resourceGroupName: replace-with-your-resource-group

stages:
  - stage: Build
    displayName: Build and Push Image
    jobs:
      - job: BuildImage
        displayName: Build Image
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: Docker@2
            displayName: Build and push image to ACR
            inputs:
              command: buildAndPush
              repository: $(imageRepository)
              dockerfile: $(dockerfilePath)
              containerRegistry: $(acrServiceConnection)
              tags: |
                $(Build.BuildId)
                latest

  - stage: Deploy
    displayName: Deploy to Azure Container Apps
    dependsOn: Build
    condition: succeeded()
    jobs:
      - job: DeployApp
        displayName: Deploy Image
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: AzureCLI@2
            displayName: Update container app image
            inputs:
              azureSubscription: $(azureSubscription)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az extension add --name containerapp --upgrade
                az containerapp update \
                  --name "$(containerAppName)" \
                  --resource-group "$(resourceGroupName)" \
                  --image "$(acrLoginServer)/$(imageRepository):$(Build.BuildId)"