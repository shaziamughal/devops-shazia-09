trigger:
  branches:
    include:
      - main

variables:
  # Must match the Azure DevOps service connection name exactly.
  azureServiceConnectionName: Azure-DevOps-Connection
  appServiceName: ShaziaWebApp
  packageName: site.zip

stages:
  - stage: Build
    displayName: Build Package
    jobs:
      - job: BuildApp
        displayName: Package Static Site
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: ArchiveFiles@2
            displayName: Archive site files
            inputs:
              rootFolderOrFile: $(Build.SourcesDirectory)
              includeRootFolder: false
              archiveType: zip
              archiveFile: $(Build.ArtifactStagingDirectory)/$(packageName)
              replaceExistingArchive: true

          - publish: $(Build.ArtifactStagingDirectory)/$(packageName)
            artifact: drop

  - stage: Deploy
    displayName: Deploy to Azure App Service
    dependsOn: Build
    condition: succeeded()
    jobs:
      - job: DeployWebApp
        displayName: Deploy Package
        pool:
          vmImage: ubuntu-latest
        steps:
          - download: current
            artifact: drop

          - task: AzureWebApp@1
            displayName: Deploy to App Service
            inputs:
              azureSubscription: $(azureServiceConnectionName)
              appName: $(appServiceName)
              package: $(Pipeline.Workspace)/drop/$(packageName)